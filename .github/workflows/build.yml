name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Java is required for Android builds
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK (Non-Interactive)
        run: |
          # The -y flag tells it to automatically install Flutter SDK
          # --no-interactive prevents it from waiting for human input
          flet build apk --no-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: build/apk/*.apk